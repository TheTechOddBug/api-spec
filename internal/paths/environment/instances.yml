get:
  operationId: "getEnvironmentInstances"
  summary: List Environment Instances
  description: |
    Lists all instances present in this instance's environment.

    Requires the `environment` scope to be set on the container runtime config.
  tags:
    - Environments
    - Instances
  x-cycle-scopes:
    - environment
  parameters: []
  responses:
    default:
      $ref: ../../../components/responses/errors/DefaultError.yml
    200:
      description: Returns a list of instances.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  "$ref": "../../../components/schemas/containers/instances/Instance.yml"
