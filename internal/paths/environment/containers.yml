get:
  operationId: "getEnvironmentContainers"
  summary: List Environment Containers
  description: |
    Lists all Containers that are part of the same Environment as this Instance.

    Requires the `environment` scope to be set on the container runtime config.
  tags:
    - Environments
  x-cycle-scopes:
    - environment
  parameters: []
  responses:
    default:
      $ref: ../../../components/responses/errors/DefaultError.yml
    200:
      description: Returns a collection of container resources.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  "$ref": "../../../components/schemas/containers/Container.yml"
