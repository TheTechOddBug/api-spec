get:
  operationId: "getEnvironmentScopedVariables"
  summary: Get Environment Scoped Variables
  description: |
    Gets the scoped variables that are accessible to this instance via internal API.

    Requires the `environment` scope to be set on the container runtime config.
  tags:
    - Scoped Variables
  x-cycle-scopes:
    - environment
  parameters: []
  responses:
    default:
      $ref: ../../../components/responses/errors/DefaultError.yml
    200:
      description: Returns a map of variable values, keyed by their identifier.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                additionalProperties:
                  type: string
