get:
  operationId: "getNetworks"
  summary: List Networks
  description: |
    Lists all networks attached to this instance.

    Requires the `networks` scope to be set on the container runtime config.
  tags:
    - SDN
  parameters: []
  x-cycle-scopes:
    - networks
  responses:
    default:
      $ref: ../../../components/responses/errors/DefaultError.yml
    200:
      description: Returns a list of networks.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  "$ref": "../../../components/schemas/sdn/networks/Network.yml"
