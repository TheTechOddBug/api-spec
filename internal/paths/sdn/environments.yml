get:
  operationId: "getNetworkEnvironments"
  summary: List Network Environments
  description: |
    Lists all environments present in this instance's SDN networks.

    Requires the `networks` scope to be set on the container runtime config.
  tags:
    - SDN
    - Environments
  parameters: []
  x-cycle-scopes:
    - networks
  responses:
    default:
      $ref: ../../../components/responses/errors/DefaultError.yml
    200:
      description: Returns a list of environments.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  "$ref": "../../../components/schemas/environments/Environment.yml"
